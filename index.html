<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
WWW : FINAL CHAPTER
</title>


<style>


*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{

margin:0;

height:100vh;

overflow:hidden;

background:#000;

color:white;

}



#app{

width:100vw;

height:100vh;

position:relative;

overflow:hidden;

}




/* ==================
 공통 장면
================== */


.scene{

position:absolute;

inset:0;


display:flex;

align-items:center;

justify-content:center;

flex-direction:column;


opacity:0;

pointer-events:none;


transition:

opacity 2s ease;


}




.scene.active{

opacity:1;

pointer-events:auto;

}





/* ==================
 BOOT
================== */


#boot{


background:#000;

}



.system{


font-size:18px;

letter-spacing:6px;

color:#aaa;


}



.loading{


width:300px;

height:3px;

background:#222;

margin-top:40px;

overflow:hidden;


}



.loading-bar{


width:0%;

height:100%;

background:white;


animation:

loading 5s forwards;


}




@keyframes loading{


to{

width:100%;

}

}





/* ==================
 ARCHIVE
================== */


#archive{


background:


radial-gradient(

circle,

#323232,

#000 70%

);


}




.archive-title{


font-size:55px;

letter-spacing:15px;


}



.archive-sub{


margin-top:20px;

letter-spacing:5px;

color:#aaa;


}







/* CORE */


.core{


margin-top:80px;


width:220px;

height:220px;


border-radius:50%;


border:

1px solid white;


display:flex;

align-items:center;

justify-content:center;


cursor:pointer;


font-size:20px;


letter-spacing:5px;


box-shadow:


0 0 70px rgba(255,255,255,.4);


animation:

floating 4s infinite;


}




@keyframes floating{


50%{

transform:translateY(-15px);

}


}





.core:hover{


box-shadow:

0 0 120px white;


}








/* ==================
 MEMORY
================== */



.memory-title{


font-size:45px;

letter-spacing:10px;


}




.memory-box{


margin-top:60px;


width:400px;


padding:40px;


border:

1px solid rgba(255,255,255,.4);


text-align:center;


background:

rgba(255,255,255,.05);


}



.memory-text{


font-size:20px;

line-height:2;


}




.memory-button{


margin-top:40px;


padding:15px 50px;


background:none;


border:

1px solid white;


color:white;


border-radius:30px;


cursor:pointer;


}





/* ==================
 FINAL
================== */


#final{


background:


radial-gradient(

circle,

#ffffff,

#93c5fd 10%,

#020617 50%

);


}





.final-light{


position:absolute;


width:100px;


height:100px;


background:white;


border-radius:50%;


box-shadow:

0 0 150px white;


animation:

lightOpen 4s forwards;


}



@keyframes lightOpen{


from{

transform:scale(0);

}



to{

transform:scale(20);

opacity:0;

}


}





.logo{


font-size:130px;


letter-spacing:35px;


opacity:0;


animation:

logoShow 3s 2s forwards;


}





@keyframes logoShow{


to{

opacity:1;

}


}






.album{


margin-top:40px;


font-size:25px;


letter-spacing:8px;


text-align:center;


opacity:0;


animation:

textShow 3s 4s forwards;


}





.release{


margin-top:50px;


letter-spacing:6px;


color:#cbd5e1;


opacity:0;


animation:

textShow 3s 5s forwards;


}




@keyframes textShow{


to{

opacity:1;

}


}






/* 노이즈 */


#app::after{


content:"";


position:absolute;

inset:0;


background:

repeating-linear-gradient(

0deg,

transparent,

transparent 3px,

rgba(255,255,255,.03) 4px

);


pointer-events:none;


}


</style>
</head>


<body>


<div id="app">



<!-- BOOT -->

<div class="scene active" id="boot">


<div class="system" id="systemText">

CONNECTING WWW SYSTEM...

</div>


<div class="loading">

<div class="loading-bar"></div>

</div>


</div>








<!-- ARCHIVE -->

<div class="scene" id="archive">


<div class="archive-title">

WWW ARCHIVE

</div>



<div class="archive-sub">

FINAL DATA FOUND

</div>






<div class="core" onclick="openCore()">

CORE

</div>




<div class="archive-sub" id="archiveMessage">

WAITING...

</div>




</div>









<!-- MEMORY -->


<div class="scene" id="memory">



<div class="memory-title">

MEMORY FRAGMENT

</div>




<div class="memory-box">


<div class="memory-text" id="memoryText">


</div>



<button class="memory-button" onclick="openFinal()">

OPEN LAST FILE

</button>



</div>




</div>









<!-- FINAL -->


<div class="scene" id="final">


<div class="final-light"></div>


<div class="logo">

WWW

</div>



<div class="album">


DEBUT ALBUM

<br>

THE FIRST PAGE


</div>



<div class="release">


2026

<br><br>

THE STORY BEGINS


</div>


</div>









<script>



let core=false;



let typingTimer;








function changeScene(id){


document

.querySelectorAll(".scene")

.forEach(scene=>{


scene.classList.remove("active");


});




document

.getElementById(id)

.classList.add("active");


}









function typing(id,text,speed=80){



let element=

document.getElementById(id);



element.innerHTML="";


let i=0;



clearInterval(typingTimer);



typingTimer=setInterval(()=>{


element.innerHTML+=text[i];


i++;



if(i>=text.length){


clearInterval(typingTimer);


}



},speed);



}









// 시작 연출



setTimeout(()=>{


changeScene("archive");



typing(

"archiveMessage",

"WE KNEW YOU WOULD ARRIVE."

);



},5500);









// CORE 클릭



function openCore(){



if(core)

return;



core=true;




document.querySelector(".core")

.style.transform=

"scale(1.4)";




setTimeout(()=>{


changeScene("memory");



typing(

"memoryText",

`

MEMORY FILE FOUND.


삭제된 기록.


하지만 아직 존재한다.


당신이 이곳에 도착할 것을

이미 알고 있었다.

`

);



},1500);



}










// 마지막 파일



function openFinal(){



changeScene("final");


}







</script>


</div>


</body>

</html>
